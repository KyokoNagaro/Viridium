# Erekir

## Blocks

### Overwrite

block.reinforced-vault.description = Stores a large amount of items. Contents can be retrieved via unloaders.

block.reinforced-container.description = Stores a small amount of items. Contents can be retrieved via unloaders.

block.duct-unloader.description = Unloads the selected item from the block behind it.

### Crafting

block.viridium-arkycite-cultivator.name = Arkicite Extractor
block.viridium-arkycite-cultivator.description = Uses hydrogen to extract arkycite from the soil. Requires power.

block.viridium-slag-melter.name = Slag Melter
block.viridium-slag-melter.description = Synthesizes slag from a basis of thorium. Requires power.

block.viridium-superdrive.name = Superdrive
block.viridium-superdrive.description = Boosts the production of blocks nearby. Requires power and water.

block.viridium-auxiliary-fabricator.name = Auxiliary Fabricator
block.viridium-auxiliary-fabricator.description = Produces the suportive unit comet. Outputed units can be used directly, or moved into refabricator for upgrading.

block.viridium-auxiliary-refabricator.name = Auxiliary Refabricator
block.viridium-auxiliary-refabricator.description = Rebuilds comet into an advanced mining unit, atlas

### Units

unit.viridium-comet.name = Comet 
unit.viridium-comet.description = The only assisting unit brought to Erekir. Heals block and assist in building.

unit.viridium-atlas.name = Atlas
unit.viridium-atlas.description = Heavy mining unit. Capable of displacing large quantities of resources. Versatile equipment.

### Turrets

block.viridium-aura.name = Aura
block.viridium-aura.description = Basic turret. Throws projectiles at enemies at a relatively fast rate.

# Etherean

## Block

### Distribution

block.viridium-arc-bridge.name = Arc Bridge
block.viridium-arc-bridge.description = Transports items over buildings or terrain.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-arc-junction.name = Arc Junction
block.viridium-arc-junction.description = Acts as a bridge for two crossing ducts.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-arc-underflow-gate.name = Arc Underflow Gate
block.viridium-arc-underflow-gate.description = Opposite of the arc overflow gate. Outputs to the front only if the left and right paths are blocked.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-arc-overflow-duct.name = Arc Overflow Duct
block.viridium-arc-overflow-duct.description = Outputs to the left and rigth paths only if the front is blocked.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-arc-router.name = Arc Router
block.viridium-arc-router.description = Outputs items in three directions equaly.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-arc-sorter.name = Arc Sorter
block.viridium-arc-sorter.description = If an input item match the slection, it passes forward. Otherwise, the item is outputed to the left and right.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-inverted-arc-sorter.name = Inverted Arc Sorter
block.viridium-inverter-arc-sorter.description = Similar to a standard arc sorter, but ouputs the selected item to the left and right instead.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-arc-unloader.name = Arc Unloader
block.viridium-arc-unloader.description = Unloads the selected item from the block behind it.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-titanium-duct.name = Titanium Duct
block.viridium-titanium-duct.description = Moves items forward.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-flux-loader.name = Flux Loader
block.viridium-flux-loader.description = Charges items into a flux unit for it to transfer them to flux unloader. Requires water.\n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-flux-unloader.name = Flux Unloader
block.viridium-flux-unloader.description = Receives selected items from flux units.\n[accent]Faction:[] [#a2ddfc]Etheran[]

### Crafting

block.viridium-neodymium-centrifuge.name = Neodymium Extractor
block.viridium-neodymium-centrifuge.description = Filters the small quantity of neodymium present in the sand. Require water. \n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-crystaline-condenser.name = Crystaline Condenser
block.viridium-crystaline-condenser.description = Solidifies matter from vents to create Crysta. \n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-cryofluid-synthesizer.name = Cryofluid Synthesizer
block.viridium-cryofluid-synthesizer.description = Infuses water with titanium to create a potent coolant. \n[accent]Faction:[] [#a2ddfc]Etheran[]

### Production

block.viridium-arc-drill.name = Arc drill
block.viridium-arc-drill.description = Creates detonation thanks to a powerfull energy arc. Very performant to mine titanium and sand. \n[accent]Faction:[] [#a2ddfc]Etheran[]

block.viridium-pulse-extractor.name = Pulse Extractor
block.viridium-pulse-extractor.description = Pumps water from deep beneath the ground. \n[accent]Faction:[] [#a2ddfc]Etheran[]

### Power

block.viridium-getelos-node.name = Getelos Beacon
block.viridium-getelos-node.description = Very long range. Allow to exploit a specific area. Highly restrictive due to power usage. \n[accent]Faction:[] [#a2ddfc]Etheran[]

### Effects

block.viridium-core-getelos.name = Core: Getelos
block.viridium-core-getelos.description = The core of the Ehtereans. Provides power, stores a lot of items but has no upgrade and is not very well armored. \n[accent]Faction:[] [#a2ddfc]Etheran[]

### Unit Blocks

unit.viridium-etherean-factory.name = Etherean Factory
unit.viridium-etherean-factory.description = Creates the three base units of the Etherean faction.\n[accent]Faction:[] [#a2ddfc]Etheran[]

### Units 

unit.viridium-sachiel.name = Sachiel
unit.viridium-sachiel.description = Defends the Getelos Core. Armed with bomb and has high building and mining capability. Not very fast. \n[accent]Faction:[] [#a2ddfc]Etheran[]

unit.viridium-golem.name = Golem
unit.viridium-golem.description = Fires long-range missiles. Capable of flight.\n[accent]Faction:[] [#a2ddfc]Etheran[]

unit.viridium-chthonian.name = Chthonian
unit.viridium-chthonian.description = Polyvalent unit. Capable of mining, assist building and neutralize targets.\n[accent]Faction:[] [#a2ddfc]Etheran[]

unit.viridium-sofiel.name = Sofiel
unit.viridium-sofiel.description = Very fast flying unit. Armed with a short range lightning emiting weapon.\n[accent]Faction:[] [#a2ddfc]Etheran[]

unit.viridium-flux.name = Flux

